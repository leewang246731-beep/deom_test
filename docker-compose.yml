# ============================================================
# 多平台智能托管 SaaS + vMall — Docker 统一部署
#
# 启动:
#   仅 SaaS:       docker-compose up -d
#   SaaS + vMall:  docker-compose --profile full up -d
#
# 安全: MySQL/Redis 仅内部网络可达，不暴露到宿主机
# ============================================================

version: "3.8"

services:
  # ===== 基础设施 (内部网络，不暴露端口) =====
  mysql:
    image: mysql:8.0
    container_name: saas-mysql
    networks:
      - saas-net
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-saas_demo_2026}
      MYSQL_DATABASE: ${DB_NAME:-demo_test}
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
      --innodb-use-native-aio=0
      --innodb-flush-method=fsync
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-p${DB_PASSWORD:-saas_demo_2026}"]
      interval: 15s
      timeout: 10s
      retries: 30
      start_period: 180s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: saas-redis
    networks:
      - saas-net
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ===== SaaS 后端 :8012 =====
  saas-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: saas-backend
    networks:
      - saas-net
    ports:
      - "${SAAS_PORT:-8012}:8012"
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: ${DB_PASSWORD:-saas_demo_2026}
      DB_NAME: ${DB_NAME:-demo_test}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ""
      PLATFORM_MODE: ${PLATFORM_MODE:-mock}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-qwen-plus}
      LLM_API_BASE: ${LLM_API_BASE:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      USE_MULTI_AGENT: ${USE_MULTI_AGENT:-true}
      LOGIN_RATE_LIMIT: 10
      VMALL_BASE_URL: ${VMALL_BASE_URL:-http://vmall-backend:8020}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-chat}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - chroma_data:/app/data/chroma
      - upload_data:/app/data/uploads
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8012/api/v1/health')"]
      interval: 20s
      timeout: 10s
      retries: 5
      # 全新数据卷首启需建表 + seed.py --backfill（数百次 embedding 调用），耗时较长，
      # 故放宽至 5 分钟，避免 compose 在 seed 完成前误判 unhealthy 而中止前端依赖。
      start_period: 300s
    restart: unless-stopped

  # ===== SaaS 前端 :8093 =====
  saas-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: saas-frontend
    networks:
      - saas-net
    ports:
      - "${ADMIN_PORT:-8093}:80"
      - "${MERCHANT_PORT:-8094}:81"
      - "${SERVICE_PORT:-8095}:82"
    depends_on:
      saas-backend:
        condition: service_healthy
    restart: unless-stopped

  # ===== vMall 后端 :8020 (可选) =====
  vmall-backend:
    build:
      context: ./vmall_system/backend
      dockerfile: Dockerfile
    container_name: vmall-backend
    networks:
      - saas-net
    ports:
      - "${VMALL_PORT:-8020}:8020"
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: ${DB_PASSWORD:-saas_demo_2026}
      DB_NAME: ${DB_NAME:-demo_test}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SAAS_BASE_URL: ${SAAS_BASE_URL:-http://saas-backend:8012}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles:
      - full
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8020/docs')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  # ===== vMall 前端 :8092 运营后台 =====
  vmall-frontend-admin:
    build:
      context: ./vmall_system/frontend_admin
      dockerfile: Dockerfile
    container_name: vmall-frontend-admin
    networks:
      - saas-net
    ports:
      - "${VMALL_ADMIN_PORT:-8092}:80"
    profiles:
      - full
    depends_on:
      - vmall-backend
    restart: unless-stopped

  # ===== vMall 前端 :8091 商户端 =====
  vmall-frontend-merchant:
    build:
      context: ./vmall_system/frontend_merchant
      dockerfile: Dockerfile
    container_name: vmall-frontend-merchant
    networks:
      - saas-net
    ports:
      - "${VMALL_MERCHANT_PORT:-8091}:80"
    profiles:
      - full
    depends_on:
      - vmall-backend
    restart: unless-stopped

  # ===== vMall 前端 :8090 买家H5 =====
  vmall-frontend-consumer:
    build:
      context: ./vmall_system/frontend_consumer
      dockerfile: Dockerfile
    container_name: vmall-frontend-consumer
    networks:
      - saas-net
    ports:
      - "${VMALL_CONSUMER_PORT:-8090}:80"
    profiles:
      - full
    depends_on:
      - vmall-backend
    restart: unless-stopped

networks:
  saas-net:
    driver: bridge
    name: saas-net

volumes:
  mysql_data:
    driver: local
  chroma_data:
    driver: local
  upload_data:
    driver: local
